name: BookBuddy AI Enterprise Backend CI/CD Pipeline

on:
  push:
    branches: [ main, master, staging, develop ]
  pull_request:
    branches: [ main, master, staging ]

env:
  NODE_ENV: test
  DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/bookbuddy_test?schema=public"
  REDIS_URL: "redis://localhost:6379/0"
  JWT_ACCESS_SECRET: "CiTestJwtAccessSecretKey1234567890"
  JWT_REFRESH_SECRET: "CiTestJwtRefreshSecretKey0987654321"

jobs:
  validate-and-test:
    name: Code Quality, Linting, Tests & Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: bookbuddy_test
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js (v20 LTS)
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Validate TypeScript & Code Linting
        run: npm run lint

      - name: Generate Prisma Client & Run Schema Migrations
        run: |
          npx prisma generate
          npx prisma db push --accept-data-loss

      - name: Execute Unit & Integration Test Suite
        run: npm run test

      - name: Build Production Bundle
        run: npm run build

      - name: Verify Compiled Output Artifacts
        run: |
          ls -la dist/
          test -f dist/server.cjs
